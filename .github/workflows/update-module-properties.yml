name: Update Module Properties

on:
    release:
        types: [ published, prereleased, edited ]

    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Release tag to process (e.g., php-2025.10.31)'
                required: true

jobs:
    update-properties:
        runs-on: ubuntu-latest
        if: ${{ endsWith(github.repository, 'modules-untouched') }}
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    persist-credentials: false

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: '3.11'

            -   name: Install dependencies
                run: |
                    pip install requests packaging

            -   name: Extract module name and update properties
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
                    REPO_OWNER: ${{ github.repository_owner }}
                    REPO_NAME: ${{ github.event.repository.name }}
                run: |
                    python << 'EOF'
                    import os
                    import re
                    import requests
                    from packaging import version
                    from collections import OrderedDict
                    
                    DEBUG = False
                    def debug(*args):
                        if DEBUG:
                            print(*args)
                    
                    release_tag = os.environ['RELEASE_TAG']
                    repo_owner = os.environ['REPO_OWNER']
                    repo_name = os.environ['REPO_NAME']
                    github_token = os.environ['GITHUB_TOKEN']
                    
                    print(f"Processing release: {release_tag}")
                    
                    m = re.match(r'^([a-zA-Z0-9_-]+)-\d{4}\.\d{1,2}\.\d{1,2}', release_tag)
                    if not m:
                        print(f"ERROR: Could not extract module name from tag: {release_tag}")
                        exit(1)
                    
                    module_name = m.group(1).lower()
                    print(f"Module name: {module_name}")
                    
                    with open('module_name.txt', 'w') as f:
                        f.write(module_name)
                    
                    api_url = f"https://api.github.com/repos/{repo_owner}/{repo_name}/releases/tags/{release_tag}"
                    headers = {
                        'Authorization': f'token {github_token}',
                        'Accept': 'application/vnd.github.v3+json'
                    }
                    
                    resp = requests.get(api_url, headers=headers)
                    resp.raise_for_status()
                    release_data = resp.json()
                    
                    release_name = release_data.get('name', '') or ''
                    release_name_version = None
                    vm = re.search(r'(\d+(?:\.\d+)+)', release_name)
                    if vm:
                        release_name_version = vm.group(1)
                    
                    MODULE_RULES = {
                        "python": {
                            "patterns": [
                                r'^winpython.*\.(?:7z|zip|exe)$',
                                r'^python-.*\.(?:7z|zip|exe)$'
                            ]
                        },
                        "git": {
                            "patterns": [r'^portable.*\.(?:7z|zip|exe|7z\.exe)$']
                        },
                        "nodejs": {
                            "patterns": [r'^node-.*\.(?:7z|zip|exe)$']
                        },
                        "perl": {
                            "patterns": [r'^(strawberry|perl).*']
                        },
                        "apache": {
                            "patterns": [r'^(httpd|apache).*']
                        },
                        "powershell": {
                            "patterns": [r'^powershell-.*\.zip$']
                        },
                        "composer": {
                            "patterns": [r'.*\.phar$']
                        },
                        "xlight": {
                            "patterns": [r'^xlight-x64\.zip$']
                        },
                        "mailpit": {
                            "patterns": [r'^mailpit-windows-amd64\.zip$']
                        },
                        "ghostscript": {
                            "patterns": [r'^gs\d+w(?:32|64)\.7z$']
                        }
                    }
                    
                    def extract_version(module, filename):
                        fname = filename.lower()
                    
                        if module == "ghostscript":
                            gm = re.match(r'gs(\d+)w(?:32|64)\.7z', fname)
                            if gm:
                                digits = gm.group(1)
                                if len(digits) == 3:
                                    return f"{digits[0]}.{digits[1:]}"
                                if len(digits) == 4:
                                    if digits.startswith("10"):
                                        if digits[2:] == "00":
                                            return f"10.{digits[2]}"
                                        return f"10.{digits[2:]}"
                                    return f"{digits[0]}.{digits[1:3]}.{digits[3]}"
                                if len(digits) == 5:
                                    return f"10.{digits[2:4]}.{digits[4]}"
                            return release_name_version
                    
                        rm = re.search(r'(\d+(?:\.\d+)+(?:-\d+)?)(?=[-._]|\.(?:7z|zip|exe|phar))', filename)
                        if rm:
                            return rm.group(1)
                    
                        return release_name_version
                    
                    def matches_module(module, filename):
                        rules = MODULE_RULES.get(module)
                        if not rules:
                            return filename.lower().startswith(module.lower())
                        for pattern in rules["patterns"]:
                            if re.match(pattern, filename, re.IGNORECASE):
                                return True
                        return False
                    
                    assets = []
                    for asset in release_data.get('assets', []):
                        filename = asset['name']
                        if matches_module(module_name, filename):
                            ver = extract_version(module_name, filename)
                            if not ver:
                                DEBUG = True
                                debug(f"Failed to extract version for {filename}")
                                continue
                            assets.append({
                                "version": ver,
                                "url": asset['browser_download_url'],
                                "filename": filename
                            })
                    
                    if not assets:
                        print(f"No valid assets found for module '{module_name}'")
                        print(f"Available assets: {[a['name'] for a in release_data.get('assets', [])]}")
                        exit(0)
                    
                    properties_file = f"modules/{module_name}.properties"
                    if not os.path.exists(properties_file):
                        print(f"ERROR: Properties file not found: {properties_file}")
                        exit(1)
                    
                    with open(properties_file, 'r', encoding='utf-8') as f:
                        lines = f.readlines()
                    
                    properties = OrderedDict()
                    header_lines = []
                    in_header = True
                    
                    for line in lines:
                        stripped = line.strip()
                        if in_header and (stripped.startswith('#') or stripped == ''):
                            header_lines.append(line)
                        else:
                            in_header = False
                            if '=' in line and not stripped.startswith('#'):
                                k, v = line.split('=', 1)
                                properties[k.strip()] = v.strip()
                    
                    changes_made = False
                    for a in assets:
                        ver = a["version"]
                        url = a["url"]
                        if ver in properties:
                            if properties[ver] != url:
                                properties[ver] = url
                                changes_made = True
                        else:
                            properties[ver] = url
                            changes_made = True
                    
                    if not changes_made:
                        print(f"INFO: No changes were made to {properties_file}")
                        exit(0)
                    
                    def parse_ver(v):
                        try:
                            return version.parse(v)
                        except Exception:
                            return version.parse("0.0.0")
                    
                    sorted_props = OrderedDict(
                        sorted(properties.items(), key=lambda x: parse_ver(x[0]), reverse=True)
                    )
                    
                    with open(properties_file, 'w', encoding='utf-8') as f:
                        for line in header_lines:
                            f.write(line)
                        for k, v in sorted_props.items():
                            f.write(f"{k} = {v}\n")
                    
                    print(f"SUCCESS: Updated {properties_file}")
                    EOF

            -   name: Read module name
                id: module_info
                if: always()
                run: |
                    if [ -f module_name.txt ]; then
                      MODULE_NAME=$(cat module_name.txt)
                      echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
                    else
                      echo "module_name=unknown" >> $GITHUB_OUTPUT
                    fi

            -   name: Create Pull Request
                id: create_pr
                uses: peter-evans/create-pull-request@v6
                with:
                    token: ${{ secrets.GH_PAT }}
                    base: main
                    commit-message: |
                        Update ${{ steps.module_info.outputs.module_name }} module properties
                        
                        Auto-generated from release ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
                    branch: update-${{ steps.module_info.outputs.module_name }}-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
                    delete-branch: true
                    title: 'Update ${{ steps.module_info.outputs.module_name }} properties from release ${{ github.event.release.tag_name || github.event.inputs.release_tag }}'
                    body: |
                        Automated update of `${{ steps.module_info.outputs.module_name }}.properties` from release `${{ github.event.release.tag_name || github.event.inputs.release_tag }}`.
                    labels: |
                        automated
                        module-update

            -   name: Enable auto-merge
                if: steps.create_pr.outputs.pull-request-number != ''
                run: |
                    echo "Enabling auto-merge for PR #${{ steps.create_pr.outputs.pull-request-number }}"
                    gh pr merge --auto --squash ${{ steps.create_pr.outputs.pull-request-number }}
