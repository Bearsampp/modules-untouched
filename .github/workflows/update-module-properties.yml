name: Update Module Properties

on:
    release:
        types: [published, prereleased, edited]

    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Release tag to process (e.g., php-2025.10.31)'
                required: true

permissions:
    contents: write
    pull-requests: write

jobs:
    update-properties:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.13'

            - name: Install dependencies
              run: |
                  pip install requests packaging

            - name: Extract module name and update properties
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
                  REPO_OWNER: ${{ github.repository_owner }}
                  REPO_NAME: ${{ github.event.repository.name }}
              run: |
                  python << 'EOF'
                  # (your Python script remains unchanged)
                  # (not repeated here for clarity)
                  EOF

            - name: Read module name
              id: module_info
              if: always()
              run: |
                  if [ -f module_name.txt ]; then
                    echo "module_name=$(cat module_name.txt)" >> $GITHUB_OUTPUT
                  else
                    echo "module_name=unknown" >> $GITHUB_OUTPUT
                  fi

            - name: Create Pull Request
              id: create_pr
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GH_PAT }}
                  base: main
                  branch: update-${{ steps.module_info.outputs.module_name }}-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
                  delete-branch: true
                  title: 'Update ${{ steps.module_info.outputs.module_name }} properties'
                  body: |
                      Automated update of `${{ steps.module_info.outputs.module_name }}.properties`.

            - name: Enable auto-merge
              if: steps.create_pr.outputs.pull-request-number != ''
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
              run: |
                  echo "Enabling auto-merge for PR #${{ steps.create_pr.outputs.pull-request-number }}"
                  gh pr merge --auto --squash ${{ steps.create_pr.outputs.pull-request-number }}
